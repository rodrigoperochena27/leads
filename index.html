<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead Panel</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;margin:0 auto;padding:14px;max-width:480px;color:#111}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:14px}
.center{text-align:center;padding-top:36px;padding-bottom:36px}
.toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.lead-id{font-size:12px;font-weight:700;letter-spacing:1px;color:#9ca3af}
.pill{color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px}
h1{margin:0 0 2px;font-size:24px}
h2{margin:0}
.biz{color:#4b5563;margin:2px 0 10px;font-size:15px}
.muted{color:#6b7280}
.chips{margin-bottom:10px}
.chip{display:inline-block;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;margin:0 6px 6px 0}
.notes{background:#f9fafb;border:1px solid #f0f1f3;border-radius:12px;padding:10px 14px;margin-bottom:12px}
.notes ul{margin:4px 0 2px;padding-left:18px}
.notes li{font-size:14px;color:#374151;margin-bottom:3px}
.det{background:#f9fafb;border:1px solid #f0f1f3;border-radius:12px;padding:10px 14px;margin-bottom:12px}
.det summary{font-size:13px;font-weight:700;color:#374151;cursor:pointer}
.drow{display:flex;justify-content:space-between;gap:12px;font-size:14px;padding:6px 0;border-bottom:1px solid #f0f1f3}
.drow span{color:#6b7280}
.drow b{text-align:right}
.act-block{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin-bottom:12px}
.act-block ul{margin:4px 0 2px;padding-left:18px}
.act-block li{font-size:14px;color:#374151;margin-bottom:3px}
.label{font-size:11px;font-weight:700;letter-spacing:1px;color:#9ca3af;margin:0 0 8px}
.acts{display:flex;gap:10px;margin-top:4px}
.act{flex:1;text-align:center;padding:13px;border-radius:12px;background:#f3f4f6;color:#111;text-decoration:none;font-weight:700;font-size:15px}
.st{display:block;width:100%;padding:14px 16px;margin-bottom:8px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;color:#111;font-size:15px;font-weight:600;text-align:left;cursor:pointer}
.st:before{content:'';display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--c);margin-right:12px;vertical-align:1px}
.st.sel{border-color:var(--c);box-shadow:inset 4px 0 0 var(--c);background:#fafafa}
.curtag{float:right;font-size:11px;font-weight:600;color:#9ca3af;letter-spacing:.5px}
.ctx{display:none;background:#f9fafb;border-radius:12px;padding:12px;margin:10px 0}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin:8px 0 4px}
.req{color:#dc2626;font-weight:500;font-size:11px}
.opt{color:#9ca3af;font-weight:500;font-size:11px}
input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;font-size:16px;background:#fff}
textarea{height:64px;resize:vertical}
.errline{color:#dc2626;font-size:14px;font-weight:600;min-height:18px;margin:8px 0 4px}
.save{display:block;width:100%;padding:16px;border:0;border-radius:12px;font-size:16px;font-weight:700;color:#fff;background:#111;cursor:pointer;margin-top:4px}
.save:disabled{background:#d1d5db;cursor:default}
.banner{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;font-weight:600;font-size:14px;border-radius:12px;padding:12px 14px;margin-bottom:14px}
.okmark{width:64px;height:64px;line-height:64px;border-radius:50%;background:#16a34a;color:#fff;font-size:34px;font-weight:700;margin:0 auto}
.btn-back{display:inline-block;margin-top:16px;padding:13px 26px;border-radius:12px;background:#111;color:#fff;text-decoration:none;font-weight:700;border:0;font-size:15px;cursor:pointer}
.spin{width:36px;height:36px;border:4px solid #e5e7eb;border-top-color:#111;border-radius:50%;margin:40px auto;animation:g 0.8s linear infinite}
@keyframes g{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div class="spin"></div></div>

<script>
// ====== CONFIGURA ESTO: tu URL /exec del Apps Script ======
var API = 'https://script.google.com/macros/s/AKfycbzM7om8_aOjm-PGDtI3-1FR_falJ6qxtGEspvo00CYtKe1xLur6DFMPRwXi7RfHX3wgtQ/exec';
// ===========================================================

var qs = new URLSearchParams(location.search);
var ID = qs.get('id'), T = qs.get('t');
var app = document.getElementById('app');
var COLORES = {'New / Transferred':'#6b7280','Contacted':'#16a34a','Not Reached':'#6b7280',
  'Follow-Up':'#d97706','Quoted':'#2563eb','Bound / Sold':'#14532d','Declined':'#dc2626','Dead / Lost':'#374151'};
// [clave API, etiqueta del botón, color, estado en el Sheet]
var OPCIONES = [
  ['contacted','Contacted','#16a34a','Contacted'],
  ['not_reached','Not Reached','#6b7280','Not Reached'],
  ['followup','Follow-Up','#d97706','Follow-Up'],
  ['quoted','Quoted','#2563eb','Quoted'],
  ['sold','Sold','#14532d','Bound / Sold'],
  ['declined','Declined','#dc2626','Declined']
];
var sel = null, selLabel = '', LEAD = null;

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

function cargar(bannerError) {
  app.innerHTML = '<div class="spin"></div>';
  fetch(API + '?api=lead&id=' + encodeURIComponent(ID) + '&t=' + encodeURIComponent(T))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.ok) { app.innerHTML = '<div class="card center"><h2>Invalid link</h2><p class="muted">' + esc(d.error || 'This link does not match any lead.') + '</p></div>'; return; }
      LEAD = d; render(bannerError || '');
    })
    .catch(function(){ app.innerHTML = '<div class="card center"><h2>Connection error</h2><p class="muted">Please try again.</p></div>'; });
}

function render(bannerError) {
  var d = LEAD, pc = COLORES[d.status] || '#6b7280';
  var j = d.jenny || {notes: []};
  var chips = (d.coverages || []).map(function(c){ return '<span class="chip">' + esc(c) + '</span>'; }).join('');
  var notas = '';
  if (d.notes) {
    notas = '<div class="notes"><p class="label">Notes</p><ul>' +
      d.notes.split(';').map(function(s){return s.trim();}).filter(Boolean)
        .map(function(n){ return '<li>' + esc(n) + '</li>'; }).join('') + '</ul></div>';
  }

  // Actividad previa de Jenny: premium/comisión registrados, loss reason y su historial de notas
  var actividad = '';
  var actRows = [];
  if (j.premium) actRows.push('<div class="drow"><span>Policy premium</span><b>$' + esc(j.premium) + '</b></div>');
  if (j.agent_comm) actRows.push('<div class="drow"><span>Agent commission</span><b>$' + esc(j.agent_comm) + '</b></div>');
  if (j.loss_reason) actRows.push('<div class="drow"><span>Loss reason</span><b>' + esc(j.loss_reason) + '</b></div>');
  var actNotas = (j.notes && j.notes.length)
    ? '<ul>' + j.notes.map(function(n){ return '<li>' + esc(n) + '</li>'; }).join('') + '</ul>' : '';
  if (actRows.length || actNotas) {
    actividad = '<div class="act-block"><p class="label">Your activity</p>' + actRows.join('') + actNotas + '</div>';
  }

  var det = '';
  if (d.details && d.details.length) {
    det = '<details class="det"><summary>Full details</summary>' +
      d.details.map(function(x){ return '<div class="drow"><span>' + esc(x[0]) + '</span><b>' + esc(x[1]) + '</b></div>'; }).join('') +
      '</details>';
  }

  // Todos los estados visibles. El actual se marca "current": elegirlo
  // sirve para guardar SOLO notas sin mover el lead de estado.
  var botones = OPCIONES.map(function(o){
    var esActual = o[3] === d.status;
    return '<button type="button" class="st" data-s="' + o[0] + '" data-l="' + o[1] + '" style="--c:' + o[2] + '">' +
      o[1] + (esActual ? '<span class="curtag">CURRENT</span>' : '') + '</button>';
  }).join('');

  app.innerHTML =
    '<div class="card">' +
      '<div class="toprow"><span class="lead-id">LEAD ' + esc(d.id) + '</span>' +
      '<span class="pill" style="background:' + pc + '">' + esc(d.status) + '</span></div>' +
      '<h1>' + esc(d.name) + '</h1>' +
      '<p class="biz">' + esc(d.business) + (d.type ? ' · ' + esc(d.type) : '') + '</p>' +
      (chips ? '<div class="chips">' + chips + '</div>' : '') +
      notas + actividad + det +
      '<div class="acts">' +
        '<a class="act" href="tel:+1' + esc(d.phone10) + '">Call</a>' +
        '<a class="act" href="https://wa.me/1' + esc(d.phone10) + '">WhatsApp</a>' +
      '</div>' +
    '</div>' +
    (bannerError ? '<div class="banner">' + esc(bannerError) + '</div>' : '') +
    '<div class="card">' +
      '<p class="label">UPDATE STATUS</p>' +
      '<div id="sts">' + botones + '</div>' +
      '<div id="box-sold" class="ctx">' +
        '<label>Policy premium ($) <span class="req">required</span></label>' +
        '<input id="sold_premium" type="number" step="0.01" min="0.01" inputmode="decimal" placeholder="0.00">' +
        '<label>Agent commission ($) <span class="req">required</span></label>' +
        '<input id="sold_comm" type="number" step="0.01" min="0.01" inputmode="decimal" placeholder="0.00">' +
      '</div>' +
      '<div id="box-quoted" class="ctx">' +
        '<label>Quoted premium ($) <span class="opt">optional</span></label>' +
        '<input id="quoted_premium" type="number" step="0.01" min="0.01" inputmode="decimal" placeholder="0.00">' +
      '</div>' +
      '<div id="box-declined" class="ctx">' +
        '<label>Reason</label><select id="reason">' +
        ['Price too high','Coverage mismatch','No response from client','Slow follow-up',
         'Went with another agent','Not qualified / ineligible','Other']
          .map(function(r){ return '<option>' + r + '</option>'; }).join('') +
        '</select>' +
      '</div>' +
      '<label>Notes <span class="opt">optional</span></label>' +
      '<textarea id="notes" placeholder="Anything worth noting"></textarea>' +
      '<p id="err" class="errline"></p>' +
      '<button id="save" class="save" disabled>Select a status above</button>' +
    '</div>';

  sel = null; selLabel = '';

  // Prefill con lo ya registrado, para que re-guardar no obligue a re-teclear
  if (j.premium) {
    document.getElementById('sold_premium').value = j.premium;
    document.getElementById('quoted_premium').value = j.premium;
  }
  if (j.agent_comm) document.getElementById('sold_comm').value = j.agent_comm;

  var boxes = {sold:'box-sold', quoted:'box-quoted', declined:'box-declined'};
  var btns = app.querySelectorAll('.st');
  btns.forEach(function(b){
    b.onclick = function(){
      sel = b.getAttribute('data-s');
      selLabel = b.getAttribute('data-l');
      btns.forEach(function(x){ x.className = 'st'; });
      b.className = 'st sel';
      Object.keys(boxes).forEach(function(k){ document.getElementById(boxes[k]).style.display = 'none'; });
      if (boxes[sel]) document.getElementById(boxes[sel]).style.display = 'block';
      var sv = document.getElementById('save');
      sv.disabled = false;
      sv.textContent = 'Save: ' + selLabel;
    };
  });

  document.getElementById('save').onclick = function(){
    var err = document.getElementById('err');
    var sv = document.getElementById('save');
    err.textContent = '';

    // Error inline: el formulario queda intacto, nada de lo tecleado se pierde
    function fallo(msg){
      err.textContent = msg;
      sv.disabled = false;
      sv.textContent = 'Save: ' + selLabel;
    }

    if (!sel) { err.textContent = 'Choose a status first.'; return; }
    var params = {api:'save', id:ID, t:T, s:sel, notes:document.getElementById('notes').value};
    if (sel === 'sold') {
      var sp = parseFloat(document.getElementById('sold_premium').value);
      var sc = parseFloat(document.getElementById('sold_comm').value);
      if (!(sp > 0) || !(sc > 0)) { err.textContent = 'Premium and agent commission must be greater than 0.'; return; }
      if (sc > sp) { err.textContent = 'Agent commission cannot be higher than the policy premium.'; return; }
      params.sold_premium = sp; params.sold_comm = sc;
    }
    if (sel === 'quoted') params.quoted_premium = document.getElementById('quoted_premium').value;
    if (sel === 'declined') params.reason = document.getElementById('reason').value;

    sv.disabled = true; sv.textContent = 'Saving...';
    var url = API + '?' + Object.keys(params).map(function(k){
      return k + '=' + encodeURIComponent(params[k] == null ? '' : params[k]); }).join('&');
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (!d.ok) { fallo(d.error || 'Could not save. Try again.'); return; }
        var pc2 = COLORES[d.status] || '#111';
        app.innerHTML =
          '<div class="card center">' +
          '<div class="okmark">✓</div>' +
          '<h2 style="margin:12px 0 4px">Update saved</h2>' +
          '<p><b>' + esc(d.id) + '</b> marked as <span class="pill" style="background:' + pc2 + '">' + esc(d.status) + '</span></p>' +
          (d.detail ? '<p class="muted">' + esc(d.detail) + '</p>' : '') +
          '<button class="btn-back" onclick="cargar()">Back to lead</button>' +
          '</div>';
      })
      .catch(function(){ fallo('Connection error. Your changes were not saved — try again.'); });
  };
}

if (!ID || !T) {
  app.innerHTML = '<div class="card center"><h2>Invalid link</h2></div>';
} else {
  cargar();
}
</script>
</body>
</html>
